[master]
master ansible_host=master ansible_user=ansible ansible_ssh_private_key_file=/home/ansible/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[slaves]
slave1 ansible_host=slave1 ansible_user=ansible ansible_ssh_private_key_file=/home/ansible/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'
slave2 ansible_host=slave2 ansible_user=ansible ansible_ssh_private_key_file=/home/ansible/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'
