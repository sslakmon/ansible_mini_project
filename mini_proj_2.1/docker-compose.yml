version: "3.9"

services:

  master:
    image: sslakmon/ansible-master:v1.0
    container_name: master
    privileged: true
    volumes:
      - ./ssh_keys/ansible_key:/home/ansible/.ssh/id_rsa
      - ./ssh_keys/ansible_key.pub:/home/ansible/.ssh/id_rsa.pub
      - ./ssh_keys/authorized_keys:/home/ansible/.ssh/authorized_keys
      - ./ansible:/ansible
    networks:
      - ansible_net

  slave1:
    image: docker:dind
    container_name: slave1
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ssh_keys/ansible_key.pub:/home/ansible/.ssh/authorized_keys
    networks:
      - ansible_net

  slave2:
    image: docker:dind
    container_name: slave2
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ssh_keys/ansible_key.pub:/home/ansible/.ssh/authorized_keys
    networks:
      - ansible_net

networks:
  ansible_net:
    driver: bridge
