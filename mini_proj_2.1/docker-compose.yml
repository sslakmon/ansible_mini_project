version: "3.9"

services:
  master:
    image: sslakmon/ansible-master:v1.0
    container_name: master
    volumes:
      - ./ssh_keys/ansible_key:/home/ansible/.ssh/id_rsa
      - ./ssh_keys/ansible_key.pub:/home/ansible/.ssh/id_rsa.pub
      - ./ansible:/ansible
    networks:
      - ansible_net

  slave1:
    image: sslakmon/ansible-slave:v1.0
    container_name: slave1
    volumes:
      - ./ssh_keys/ansible_key.pub:/home/ansible/.ssh/authorized_keys
    networks:
      - ansible_net

  slave2:
    image: sslakmon/ansible-slave:v1.0
    container_name: slave2
    volumes:
      - ./ssh_keys/ansible_key.pub:/home/ansible/.ssh/authorized_keys
    networks:
      - ansible_net

networks:
  ansible_net:
    driver: bridge
